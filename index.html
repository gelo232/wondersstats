<body>
<div id="app"></div>
<script>
var POSITIONS=[{key:"ALL",label:"Toutes"},{key:"NONE",label:"—"},{key:"S",label:"S"},{key:"OH",label:"OH"},{key:"OPP",label:"OPP"},{key:"MB",label:"MB"},{key:"L",label:"L"}];
var SG={
  services:{name:"Services",color:"#3B82F6",stats:[{key:"srv_ace",label:"Ace"},{key:"srv_in",label:"En jeu"},{key:"srv_err",label:"Erreur"}]},
  reception:{name:"Réception",color:"#10B981",stats:[{key:"rec_in",label:"En jeu"},{key:"rec_out",label:"Hors sys."}]},
  passes:{name:"Passes",color:"#8B5CF6",stats:[{key:"pas_att",label:"Attaquable"},{key:"pas_out",label:"Hors sys."}]},
  attaques:{name:"Attaques",color:"#EF4444",stats:[{key:"atk_kill",label:"Kill"},{key:"atk_ok",label:"Réussie"},{key:"atk_err",label:"Erreur"}]},
  blocs:{name:"Blocs",color:"#F59E0B",stats:[{key:"blk_kill",label:"Kill"},{key:"blk_solo",label:"Solo"},{key:"blk_aid",label:"Aide"},{key:"blk_err",label:"Erreur"}]},
  defense:{name:"Défense",color:"#06B6D4",stats:[{key:"def_ok",label:"Réussie"},{key:"def_out",label:"Hors sys."},{key:"sup_in",label:"Soutien"},{key:"sup_err",label:"Sout. err."}]},
  habiletes:{name:"Habiletés",color:"#EC4899",stats:[{key:"hab_ctrl",label:"Contrôlée"},{key:"hab_appel",label:"Avec appel"},{key:"hab_couv",label:"Couverture"},{key:"hab_free",label:"Gratuite"}]}
};
var VIEWS=[
  {key:"service",label:"🏐 Service",groups:["services"]},
  {key:"rec_atk",label:"⚡ Réc-Att",groups:["reception","passes","attaques"]},
  {key:"transition",label:"🔄 Relance",groups:["blocs","defense","passes","attaques"]},
  {key:"habiletes",label:"🎯 Habiletés",groups:["habiletes"]},
  {key:"all",label:"📋 Toutes",groups:["services","reception","passes","attaques","blocs","defense","habiletes"]}
];
var ALL_STATS=Object.values(SG).flatMap(function(g){return g.stats});
function emptyS(){return Object.fromEntries(ALL_STATS.map(function(s){return[s.key,0]}))}
function mkPlayer(){return{name:"",position:"",number:"",stats:emptyS()}}
function mkPlayers(n){return Array.from({length:n||12},mkPlayer)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function clone(o){return JSON.parse(JSON.stringify(o))}

var state={tab:"setup",teams:[],currentTeamId:null,viewIdx:0,posFilter:"ALL",expandedGroup:null,groupIdx:0,sortBy:null,sortDir:"desc",toast:null,summaryMode:"session",modalType:null,modalInput:"",quickPlayer:null,inputMode:"quick",courtPanelOpen:false,subteamSelection:[]};
function curTeam(){return state.teams.find(function(t){return t.id===state.currentTeamId})||null}

// ═══ UNDO ═══
var undoStack=[];
var MAX_UNDO=50;
function pushUndo(label){
  var team=curTeam();if(!team)return;
  undoStack.push({label:label,teamId:team.id,players:clone(team.players)});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
  var btn=document.getElementById("undoBtn");if(btn)btn.disabled=false;
}
function doUndo(){
  if(!undoStack.length){showToast("Rien à annuler");return}
  var snap=undoStack.pop();
  var team=state.teams.find(function(t){return t.id===snap.teamId});
  if(team){team.players=snap.players;scheduleAutoSave();showToast("↩ Annulé : "+snap.label)}
  else showToast("↩ Annulé");
  render();
}

// ═══ PERSISTENCE ═══
var SK="vball_mt_v2";
var autoSaveTimer=null;
function saveAll(){try{localStorage.setItem(SK,JSON.stringify({teams:state.teams,currentTeamId:state.currentTeamId,tab:state.tab,viewIdx:state.viewIdx,posFilter:state.posFilter,inputMode:state.inputMode}))}catch(e){}}
function loadAll(){
  try{
    var d=localStorage.getItem(SK)||localStorage.getItem("vball_mt_v1");
    if(d){var o=JSON.parse(d);if(o.teams)state.teams=o.teams;if(o.currentTeamId)state.currentTeamId=o.currentTeamId;if(o.tab)state.tab=o.tab;if(o.viewIdx!=null)state.viewIdx=o.viewIdx;if(o.posFilter)state.posFilter=o.posFilter;if(o.inputMode)state.inputMode=o.inputMode;
      state.teams.forEach(function(t){
        t.players=(t.players||[]).map(function(p){return Object.assign({},mkPlayer(),p,{stats:Object.assign({},emptyS(),p.stats||{})})});
        if(!t.activePlayers)t.activePlayers=[];
        if(!t.subteams)t.subteams=[];
        (t.sessions||[]).forEach(function(s){s.players=(s.players||[]).map(function(p){return Object.assign({},mkPlayer(),p,{stats:Object.assign({},emptyS(),p.stats||{})})})});
      });
    }
    if(!state.teams.length){
      var oldS=localStorage.getItem("vball_sessions_v5"),oldC=localStorage.getItem("vball_current_v5");
      if(oldC||oldS){var tm={id:uid(),name:"Mon équipe",players:mkPlayers(),sessions:[],activePlayers:[],subteams:[]};
        if(oldC)tm.players=JSON.parse(oldC).map(function(p){return Object.assign({},mkPlayer(),p,{stats:Object.assign({},emptyS(),p.stats||{})})});
        if(oldS)tm.sessions=JSON.parse(oldS);state.teams.push(tm);state.currentTeamId=tm.id;saveAll();}
    }
  }catch(e){}
}
function updateIndicators(saving){document.querySelectorAll(".autosave-indicator").forEach(function(el){if(saving){el.classList.add("saving");el.lastChild.textContent="Sauvegarde…"}else{el.classList.remove("saving");el.lastChild.textContent="Sauvegardé"}})}
function scheduleAutoSave(){if(autoSaveTimer)clearTimeout(autoSaveTimer);updateIndicators(true);autoSaveTimer=setTimeout(function(){saveAll();autoSaveTimer=null;updateIndicators(false)},1500)}

function exportData(){
  var data={version:7,exportDate:new Date().toISOString(),teams:state.teams};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
