<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0}
button,input,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:520px;margin:0 auto;position:relative;overflow:hidden;background:#0F172A}
@media(min-width:600px){#app{max-width:700px}}
@media(min-width:900px){#app{max-width:1000px}}
.header{background:linear-gradient(135deg,#1E3A5F,#0F172A);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top))}
@media(min-width:600px){.header{padding:16px 24px}}
.header h1{margin:0;font-size:17px;font-weight:700;color:#F8FAFC;letter-spacing:.3px}
@media(min-width:600px){.header h1{font-size:20px}}
.header-side{width:80px;display:flex}
.header-side.right{justify-content:flex-end;gap:6px}
.team-bar{background:#162032;border-bottom:1px solid #1E293B;padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto}
.team-chip{padding:5px 12px;border-radius:16px;border:1.5px solid #334155;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:transparent;color:#94A3B8;transition:all .15s}
.team-chip.active{background:#3B82F6;border-color:#60A5FA;color:#fff}
.team-chip.add{border-style:dashed;color:#64748B}
.tab-bar{display:flex;background:#1E293B;border-top:1px solid #334155;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:12px 4px 10px;border:none;background:none;cursor:pointer;color:#94A3B8;font-weight:400;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;border-top:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#60A5FA;font-weight:700;border-top-color:#60A5FA}
.tab-btn .ico{font-size:18px}
@media(min-width:600px){.tab-btn{padding:14px 4px 12px;font-size:13px}.tab-btn .ico{font-size:22px}}
.btn{padding:10px 18px;border-radius:8px;border:none;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.xs{padding:4px 8px;font-size:11px}

.btn-primary{background:#3B82F6;color:#fff}

.btn-danger-o{background:transparent;border:1.5px solid #EF4444;color:#EF4444}
.btn-ghost{background:transparent;border:1.5px solid #94A3B8;color:#94A3B8}
.btn-export{background:transparent;border:1.5px solid #F59E0B;color:#F59E0B}
.btn-import{background:transparent;border:1.5px solid #8B5CF6;color:#8B5CF6}
.btn:disabled{background:#475569;color:#94A3B8;cursor:default}
.pill-row{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#0F172A;border-bottom:1px solid #1E293B;flex-shrink:0}
@media(min-width:600px){.pill-row{padding:12px 16px;justify-content:center}}
.pill{padding:7px 14px;border-radius:20px;border:none;white-space:nowrap;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s;background:#1E293B;color:#94A3B8}

.filter-bar{padding:6px 12px;background:#0F172A;border-bottom:1px solid #1E293B;flex-shrink:0;display:flex;flex-direction:column;gap:6px}

@media(min-width:600px){.player-row .name-input{padding:10px 12px;font-size:15px}}

.pos-btns{display:flex;gap:4px}
.pos-btn{padding:7px 10px;border-radius:8px;border:2px solid #334155;font-size:12px;font-weight:700;cursor:pointer;min-width:38px;text-align:center;background:#0F172A;color:#94A3B8;transition:all .15s}
.pos-btn.active{background:#6366F1;border-color:#818CF8;color:#fff}

.grid-header{display:flex;padding:8px 12px;background:#1E293B;border-bottom:1px solid #334155;align-items:center}
@media(min-width:600px){.grid-header{padding:10px 16px}}
.grid-header .lbl{font-size:11px;color:#64748B;font-weight:600}
.grid-header .stat-labels{display:flex;flex:1;justify-content:space-around}
.grid-header .stat-lbl{text-align:center;font-size:10px;font-weight:700}
@media(min-width:600px){.grid-header .stat-lbl{font-size:12px}}
.grid-row{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #1E293B}
@media(min-width:600px){.grid-row{padding:6px 16px}}
.grid-row .pname{font-size:13px;font-weight:600;color:#F8FAFC}
@media(min-width:600px){.grid-row .pname{font-size:14px}}
.grid-row .ppos{font-size:10px;color:#64748B}
.grid-row .stats-cells{display:flex;flex:1;justify-content:space-around}
.stat-cell{display:flex;flex-direction:column;align-items:center}
.stat-btn{width:44px;height:44px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
@media(min-width:600px){.stat-btn{width:52px;height:52px;font-size:20px}}
.dec-btn{margin-top:2px;font-size:11px;background:none;border:none;color:#64748B;cursor:pointer;padding:3px 10px}
.cards-grid{display:grid;grid-template-columns:1fr;gap:8px;max-width:700px;margin:0 auto}
@media(min-width:600px){.cards-grid{grid-template-columns:1fr 1fr}}
.p-card{background:#1E293B;border-radius:10px;padding:10px 14px;border:1px solid #334155}
.p-card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.side-layout{display:flex;height:100%}
.side-nav{width:110px;background:#1E293B;border-right:1px solid #334155;overflow-y:auto;flex-shrink:0;padding:8px 0}
.side-btn{display:block;width:100%;padding:12px 14px;border:none;text-align:left;background:transparent;border-left:3px solid transparent;color:#94A3B8;font-weight:700;font-size:13px;cursor:pointer}
.side-btn.active{border-left-color:currentColor;background:rgba(255,255,255,.05)}
.sum-table{width:100%;border-collapse:collapse;font-size:12px}
@media(min-width:600px){.sum-table{font-size:14px}}
.sum-table th{padding:8px 6px;user-select:none}
@media(min-width:600px){.sum-table th,.sum-table td{padding:12px 10px}}
.sum-table th.sortable{cursor:pointer}
.sum-table td{padding:10px 6px;text-align:center;color:#E2E8F0}
.sum-table .sticky{position:sticky;left:0;z-index:1}
.sum-val{font-weight:700;font-size:16px}
@media(min-width:600px){.sum-val{font-size:18px}}
.sum-pct{font-size:10px;color:#64748B}
.totals-bar{padding:10px 12px;background:#1E293B;border-top:1px solid #334155;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
@media(min-width:600px){.totals-bar{padding:12px 16px;gap:20px}}
.totals-bar .t-val{font-size:16px;font-weight:700}
@media(min-width:600px){.totals-bar .t-val{font-size:18px}}
.totals-bar .t-lbl{font-size:10px;color:#64748B}
@media(min-width:600px){.totals-bar .t-lbl{font-size:12px}}
.sess-grid{display:grid;grid-template-columns:1fr;gap:10px;max-width:700px;margin:0 auto}
@media(min-width:600px){.sess-grid{grid-template-columns:1fr 1fr}}
.sess-card{background:#1E293B;border-radius:10px;padding:14px;border:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:99;padding:24px}
.modal{background:#1E293B;border-radius:16px;padding:24px;width:100%;max-width:380px;border:1px solid #334155}
.modal input{width:100%;background:#0F172A;border:1px solid #334155;border-radius:8px;padding:12px 14px;color:#F8FAFC;font-size:15px;outline:none;margin-bottom:16px}
.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:#334155;color:#F8FAFC;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{padding:40px;text-align:center;color:#64748B;font-size:13px}
.save-bar{padding:10px 16px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
@media(min-width:600px){.save-bar{padding:12px 24px}}
.save-bar .inner{max-width:400px;margin:0 auto}
.data-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.autosave-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748B;padding:4px 0}
.autosave-indicator .dot{width:6px;height:6px;border-radius:50%;background:#10B981;flex-shrink:0}
.autosave-indicator.saving .dot{background:#F59E0B;animation:pulse .6s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sess-count{font-size:11px;color:#64748B;text-align:center;margin:4px 0 6px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var POSITIONS=[{key:"ALL",label:"Toutes"},{key:"S",label:"S"},{key:"OH",label:"OH"},{key:"OPP",label:"OPP"},{key:"MB",label:"MB"},{key:"L",label:"L"}];
var SG={
  services:{name:"Services",color:"#3B82F6",stats:[{key:"srv_ace",label:"Ace"},{key:"srv_in",label:"En jeu"},{key:"srv_err",label:"Erreur"}]},
  reception:{name:"Réception",color:"#10B981",stats:[{key:"rec_in",label:"En jeu"},{key:"rec_out",label:"Hors sys."}]},
  passes:{name:"Passes",color:"#8B5CF6",stats:[{key:"pas_att",label:"Attaquable"},{key:"pas_out",label:"Hors sys."}]},
  attaques:{name:"Attaques",color:"#EF4444",stats:[{key:"atk_kill",label:"Kill"},{key:"atk_ok",label:"Réussie"},{key:"atk_err",label:"Erreur"}]},
  blocs:{name:"Blocs",color:"#F59E0B",stats:[{key:"blk_kill",label:"Kill"},{key:"blk_solo",label:"Solo"},{key:"blk_aid",label:"Aide"},{key:"blk_err",label:"Erreur"}]},
  defense:{name:"Défense",color:"#06B6D4",stats:[{key:"def_ok",label:"Réussie"},{key:"def_out",label:"Hors sys."},{key:"sup_in",label:"Soutien"},{key:"sup_err",label:"Sout. err."}]}
};
var VIEWS=[
  {key:"service",label:"🏐 Service",groups:["services"]},
  {key:"rec_atk",label:"⚡ Réc-Att",groups:["reception","passes","attaques"]},
  {key:"transition",label:"🔄 Relance",groups:["blocs","defense","passes","attaques"]},
  {key:"all",label:"📋 Toutes",groups:["services","reception","passes","attaques","blocs","defense"]}
];
var ALL_STATS=Object.values(SG).flatMap(function(g){return g.stats});
function emptyS(){return Object.fromEntries(ALL_STATS.map(function(s){return[s.key,0]}))}
function mkPlayers(){return Array.from({length:12},function(){return{name:"",position:"OH",number:"",stats:emptyS()}})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

var state={tab:"setup",teams:[],currentTeamId:null,viewIdx:0,posFilter:"ALL",expandedGroup:null,groupIdx:0,sortBy:null,sortDir:"desc",toast:null,summaryMode:"session",modalType:null,modalInput:""};
function curTeam(){return state.teams.find(function(t){return t.id===state.currentTeamId})||null}

// ═══ PERSISTENCE ═══
var SK="vball_mt_v1";
var autoSaveTimer=null;
function saveAll(){try{localStorage.setItem(SK,JSON.stringify({teams:state.teams,currentTeamId:state.currentTeamId,tab:state.tab,viewIdx:state.viewIdx,posFilter:state.posFilter}))}catch(e){}}
function loadAll(){
  try{
    var d=localStorage.getItem(SK);
    if(d){var o=JSON.parse(d);if(o.teams)state.teams=o.teams;if(o.currentTeamId)state.currentTeamId=o.currentTeamId;if(o.tab)state.tab=o.tab;if(o.viewIdx!=null)state.viewIdx=o.viewIdx;if(o.posFilter)state.posFilter=o.posFilter;
      state.teams.forEach(function(t){
        t.players=(t.players||[]).map(function(p){var d2=mkPlayers()[0];return Object.assign({},d2,p,{stats:Object.assign({},emptyS(),p.stats||{})})});
        (t.sessions||[]).forEach(function(s){s.players=(s.players||[]).map(function(p){var d2=mkPlayers()[0];return Object.assign({},d2,p,{stats:Object.assign({},emptyS(),p.stats||{})})})});
      });
    }
    if(!state.teams.length){
      var oldS=localStorage.getItem("vball_sessions_v5"),oldC=localStorage.getItem("vball_current_v5");
      if(oldC||oldS){var tm={id:uid(),name:"Mon équipe",players:mkPlayers(),sessions:[]};
        if(oldC)tm.players=JSON.parse(oldC).map(function(p){var d2=mkPlayers()[0];return Object.assign({},d2,p,{stats:Object.assign({},emptyS(),p.stats||{})})});
        if(oldS)tm.sessions=JSON.parse(oldS);
        state.teams.push(tm);state.currentTeamId=tm.id;saveAll();}
    }
  }catch(e){}
}
function updateIndicators(saving){document.querySelectorAll(".autosave-indicator").forEach(function(el){if(saving){el.classList.add("saving");el.lastChild.textContent="Sauvegarde…"}else{el.classList.remove("saving");el.lastChild.textContent="Sauvegardé"}})}
function scheduleAutoSave(){if(autoSaveTimer)clearTimeout(autoSaveTimer);updateIndicators(true);autoSaveTimer=setTimeout(function(){saveAll();autoSaveTimer=null;updateIndicators(false)},1500)}

function exportData(){
  var data={version:6,exportDate:new Date().toISOString(),teams:state.teams};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;a.download="VolleyStats_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast("📤 Exporté !")
}
function importData(){
  var input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();
    reader.onload=function(ev){try{var data=JSON.parse(ev.target.result);
      if(data.teams&&Array.isArray(data.teams)){var ids=new Set(state.teams.map(function(t){return t.id}));data.teams.forEach(function(t){if(ids.has(t.id))t.id=uid();state.teams.push(t)});if(!state.currentTeamId&&state.teams.length)state.currentTeamId=state.teams[0].id;saveAll();showToast("📥 "+data.teams.length+" équipe(s) importée(s) !")}
      else if(data.currentPlayers||data.sessions){var tm={id:uid(),name:"Import",players:data.currentPlayers||mkPlayers(),sessions:data.sessions||[]};state.teams.push(tm);if(!state.currentTeamId)state.currentTeamId=tm.id;saveAll();showToast("📥 Importé !")}
    }catch(err){showToast("⚠️ Fichier invalide")}};reader.readAsText(file)};input.click()
}

// ═══ GLOBAL STATS ═══
function computeGlobalPlayers(){
  var team=curTeam();if(!team||!team.sessions.length)return[];
  var map={};
  team.players.forEach(function(p){if(!p.name.trim())return;var k=p.name.trim()+"#"+(p.number||"");map[k]={name:p.name,number:p.number,position:p.position,stats:emptyS(),sessCount:0}});
  team.sessions.forEach(function(sess){sess.players.forEach(function(p){if(!p.name.trim())return;var k=p.name.trim()+"#"+(p.number||"");
    if(!map[k])map[k]={name:p.name,number:p.number,position:p.position,stats:emptyS(),sessCount:0};
    ALL_STATS.forEach(function(s){map[k].stats[s.key]+=(p.stats[s.key]||0)});
    if(ALL_STATS.some(function(s){return(p.stats[s.key]||0)>0}))map[k].sessCount++})});
  return Object.values(map).filter(function(p){return ALL_STATS.some(function(s){return p.stats[s.key]>0})})
}

// ═══ HELPERS ═══
function isTablet(){return window.innerWidth>=600}
function isLand(){return window.innerWidth>window.innerHeight}
function h(tag,attrs){
  var el=document.createElement(tag);var ch=Array.prototype.slice.call(arguments,2);
  if(attrs)for(var k in attrs){if(!attrs.hasOwnProperty(k))continue;var v=attrs[k];
    if(k==="onclick"||k==="oninput"||k==="onchange")el[k]=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v)}
  ch.forEach(function(c){if(c==null)return;if(typeof c==="string")el.appendChild(document.createTextNode(c));else if(Array.isArray(c))c.forEach(function(x){if(x)el.appendChild(x)});else el.appendChild(c)});return el
}
function bindInput(el,cb){["input","change","keyup","blur"].forEach(function(evt){el.addEventListener(evt,cb)})}
function showToast(msg){state.toast=msg;render();setTimeout(function(){state.toast=null;render()},2500)}

// ═══ RENDER PIECES ═══
function renderHeader(title,leftEl,rightEl){return h("div",{className:"header"},h("div",{className:"header-side"},leftEl),h("h1",null,title),h("div",{className:"header-side right"},rightEl))}

function renderTeamBar(){
  return h("div",{className:"team-bar"},
    state.teams.map(function(t){return h("button",{className:"team-chip"+(t.id===state.currentTeamId?" active":""),onclick:function(){state.currentTeamId=t.id;state.summaryMode="session";scheduleAutoSave();render()}},t.name)}),
    h("button",{className:"team-chip add",onclick:function(){state.modalType="newteam";state.modalInput="";render()}},"+ Équipe")
  )
}

function renderTabBar(){
  var tabs=[{key:"setup",label:"Effectif",icon:"👥"},{key:"input",label:"Saisie",icon:"✏️"},{key:"summary",label:"Récap",icon:"📊"},{key:"sessions",label:"Sessions",icon:"💾"}];
  return h("div",{className:"tab-bar"},tabs.map(function(t){return h("button",{className:"tab-btn"+(state.tab===t.key?" active":""),onclick:function(){state.tab=t.key;scheduleAutoSave();render()}},h("span",{className:"ico"},t.icon),t.label)}))
}

function renderPosFilter(){
  return h("div",{className:"pos-row"},POSITIONS.map(function(p){
    var btn=h("button",{className:"pill sm"+(state.posFilter===p.key?" active":""),onclick:function(){state.posFilter=p.key;state.sortBy=null;render()}},p.label);
    if(state.posFilter===p.key)btn.style.background="#6366F1";return btn}))
}

function filterP(players){var a=(players||curTeam().players).filter(function(p){return p.name.trim()});return state.posFilter==="ALL"?a:a.filter(function(p){return p.position===state.posFilter})}

function renderAutoSave(){var s=autoSaveTimer!==null;return h("div",{className:"autosave-indicator"+(s?" saving":"")},h("span",{className:"dot"}),s?"Sauvegarde…":"Sauvegardé")}

// ═══ SETUP ═══
function updateStartBtn(){var btn=document.getElementById("startBtn");if(btn){var t=curTeam();btn.disabled=!(t&&t.players.some(function(p){return p.name.trim()}))}}

function renderSetup(){
  var team=curTeam();if(!team)return renderNoTeam();
  var posOpts=POSITIONS.filter(function(p){return p.key!=="ALL"});
  var valid=team.players.some(function(p){return p.name.trim()});
  var grid=h("div",{className:"setup-grid"},team.players.map(function(p,i){
    var ni=h("input",{className:"name-input",placeholder:"Nom",value:p.name});
    bindInput(ni,function(e){team.players[i].name=e.target.value;scheduleAutoSave();updateStartBtn()});
    var nu=h("input",{className:"num-input",placeholder:"#",value:p.number});
    bindInput(nu,function(e){team.players[i].number=e.target.value.replace(/\D/g,"").slice(0,3);scheduleAutoSave()});
    return h("div",{className:"player-row"},
      h("span",{style:{color:"#64748B",fontSize:"12px",width:"20px",textAlign:"center",fontWeight:"600"}},String(i+1)),ni,nu,

    onOk=function(){var n=state.modalInput.trim();if(!n){showToast("⚠️ Entrez un nom");return}var tm={id:uid(),name:n,players:mkPlayers(),sessions:[]};state.teams.push(tm);state.currentTeamId=tm.id;state.tab="setup";saveAll();state.modalType=null;state.modalInput="";showToast("✅ « "+n+" » créée !")}}

// ═══ MAIN RENDER ═══
function render(){
  var app=document.getElementById("app");app.innerHTML="";
  var team=curTeam();
  var titles={setup:"Effectif 🏐",input:"Saisie en direct",summary:"Récapitulatif",sessions:"Sessions"};
  var leftEl=state.tab==="input"&&team?h("button",{className:"btn btn-danger-o sm",onclick:function(){if(confirm("Réinitialiser les stats ?")){team.players.forEach(function(p){p.stats=emptyS()});scheduleAutoSave();showToast("🔄 Réinitialisé")}}},"Reset"):null;
  var rightEl=state.tab==="summary"&&team?h("button",{className:"btn btn-save sm",onclick:function(){state.modalType="save";state.modalInput="";render()}},"💾"):null;
  app.appendChild(renderHeader(titles[state.tab]||"VolleyStats",leftEl,rightEl));
  if(state.teams.length)app.appendChild(renderTeamBar());
  var content;
  if(!team)content=renderNoTeam();
  else if(state.tab==="setup")content=renderSetup();
  else if(state.tab==="input")content=renderInput();
  else if(state.tab==="summary")content=renderSummary();
  else content=renderSessions();
  app.appendChild(content);app.appendChild(renderTabBar());
  var modal=renderModal();if(modal)app.appendChild(modal);
  if(state.toast)app.appendChild(h("div",{className:"toast"},state.toast))
}

// ═══ INIT ═══
loadAll();
if(!state.teams.length){var t={id:uid(),name:"Mon équipe",players:mkPlayers(),sessions:[]};state.teams.push(t);state.currentTeamId=t.id;saveAll()}
if(!state.currentTeamId)state.currentTeamId=state.teams[0].id;
render();
window.addEventListener("resize",function(){render()});
window.addEventListener("beforeunload",function(){saveAll()});
